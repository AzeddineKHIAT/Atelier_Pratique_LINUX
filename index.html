<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atelier pratique Linux – Pr. Azeddine KHIAT</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --navy:#1F3864; --navy-2:#2b4a82; --teal:#0D7377; --teal-2:#14a3a8;
  --amber:#B8860B; --amber-2:#d8a221;
  --bg:#f4f6fb; --panel:#ffffff; --ink:#1d2433; --muted:#5b6678;
  --line:#e3e8f0; --ok:#1f9d55; --bad:#d64545;
  --term-bg:#0d1320; --term-bar:#1b2435; --term-green:#3ad07a; --term-text:#d7e0ee;
  --shadow:0 6px 24px rgba(31,56,100,.10);
  --radius:14px;
  --mono:"Consolas","SF Mono","Menlo","Liberation Mono",monospace;
  --sans:"Segoe UI","Calibri",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.55;font-size:16px}
a{color:var(--teal)}
h1,h2,h3,h4{line-height:1.25;color:var(--navy)}
code,kbd{font-family:var(--mono)}
.hidden{display:none !important}

/* ---------- HEADER ---------- */
header.top{
  position:sticky;top:0;z-index:40;
  background:linear-gradient(100deg,var(--navy),var(--navy-2));
  color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.18);
}
.top-inner{display:flex;align-items:center;gap:14px;padding:12px 18px}
.burger{display:none;background:rgba(255,255,255,.12);border:0;color:#fff;font-size:22px;
  width:42px;height:42px;border-radius:10px;cursor:pointer;flex:0 0 auto}
.brand{display:flex;flex-direction:column;min-width:0}
.brand .t{font-size:1.02rem;font-weight:700;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand .s{font-size:.78rem;opacity:.85}
.tux{flex:0 0 auto;width:40px;height:40px;border-radius:11px;background:var(--amber);
  display:grid;place-items:center;font-size:22px}
.top-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.namebox{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);
  padding:6px 10px;border-radius:10px}
.namebox label{font-size:.72rem;opacity:.85;white-space:nowrap}
.namebox input{border:0;border-radius:7px;padding:6px 9px;font-size:.85rem;width:170px;font-family:var(--sans)}
.progress-wrap{display:flex;align-items:center;gap:8px}
.progress-wrap .lab{font-size:.74rem;opacity:.9;white-space:nowrap}
.bar{width:140px;height:9px;background:rgba(255,255,255,.22);border-radius:999px;overflow:hidden}
.bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal-2),var(--amber-2));transition:width .4s ease}
.pct{font-size:.78rem;font-weight:700;min-width:34px;text-align:right}

/* ---------- LAYOUT ---------- */
.layout{display:flex;min-height:calc(100vh - 66px)}
nav.side{
  flex:0 0 264px;background:var(--panel);border-right:1px solid var(--line);
  padding:14px 10px;position:sticky;top:66px;height:calc(100vh - 66px);overflow-y:auto;
}
.side h4{margin:6px 8px 10px;font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.navbtn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:0;background:transparent;
  padding:9px 10px;border-radius:10px;cursor:pointer;color:var(--ink);font-size:.9rem;font-family:var(--sans);
  margin-bottom:2px;transition:background .15s}
.navbtn:hover{background:#eef2f9}
.navbtn.active{background:var(--navy);color:#fff}
.navbtn.active .num{background:rgba(255,255,255,.22);color:#fff}
.navbtn .num{flex:0 0 auto;width:26px;height:26px;border-radius:8px;background:#eef2f9;color:var(--navy);
  display:grid;place-items:center;font-weight:700;font-size:.8rem;font-family:var(--mono)}
.navbtn .tx{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.navbtn .dot{flex:0 0 auto;width:9px;height:9px;border-radius:50%;background:#d7deea}
.navbtn .dot.done{background:var(--ok)}
.overlay{display:none}

main.content{flex:1;min-width:0;padding:26px 30px 70px;max-width:1080px;margin:0 auto;width:100%}
.part{display:none;animation:fade .25s ease}
.part.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.eyebrow{display:inline-block;font-size:.72rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--teal);font-weight:700;margin-bottom:6px}
.part h2{font-size:1.7rem;margin:0 0 6px}
.lead{color:var(--muted);font-size:1.02rem;margin:0 0 22px;max-width:760px}

/* cards / banners */
.banner{border-radius:12px;padding:14px 16px;margin:18px 0;border-left:5px solid}
.banner.teal{background:#e7f6f6;border-color:var(--teal)}
.banner.amber{background:#fbf3e0;border-color:var(--amber)}
.banner.navy{background:#eaf0fb;border-color:var(--navy)}
.banner b{color:var(--navy)}

.steps{counter-reset:st;list-style:none;padding:0;margin:14px 0}
.steps li{counter-increment:st;position:relative;padding:14px 16px 14px 56px;background:var(--panel);
  border:1px solid var(--line);border-radius:12px;margin-bottom:10px;box-shadow:var(--shadow)}
.steps li::before{content:counter(st);position:absolute;left:14px;top:14px;width:30px;height:30px;border-radius:9px;
  background:var(--navy);color:#fff;display:grid;place-items:center;font-weight:700;font-family:var(--mono)}
.steps li b{color:var(--navy)}

/* command cards */
.cmd-grid{display:grid;grid-template-columns:1fr;gap:14px;margin:18px 0}
.cmd{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
.cmd-h{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#f2f5fb;border-bottom:1px solid var(--line)}
.cmd-h code{font-size:.96rem;font-weight:700;color:var(--navy);background:#e4ebf7;padding:3px 9px;border-radius:7px}
.cmd-h .desc{font-size:.86rem;color:var(--muted)}
.cmd-b{padding:12px 14px;display:grid;gap:9px}
.kv{display:grid;grid-template-columns:96px 1fr;gap:8px;align-items:start;font-size:.88rem}
.kv .k{color:var(--teal);font-weight:700;font-size:.76rem;text-transform:uppercase;letter-spacing:.5px;padding-top:2px}
.kv pre{margin:0;background:#0d1320;color:#d7e0ee;padding:8px 11px;border-radius:8px;font-family:var(--mono);
  font-size:.82rem;overflow-x:auto;white-space:pre-wrap}
.kv .res{background:#eef7ef;color:#1c5b34;border:1px dashed #9ed0ad;padding:7px 10px;border-radius:8px;
  font-family:var(--mono);font-size:.8rem;white-space:pre-wrap}
.mission{background:#fbf3e0;border:1px solid #ecd9a6;border-radius:8px;padding:9px 11px;font-size:.86rem}
.mission b{color:var(--amber)}

/* missions list with verify */
.missions{display:grid;gap:10px;margin:16px 0}
.m-item{display:flex;gap:12px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);
  border-radius:11px;padding:12px 14px;box-shadow:var(--shadow)}
.m-chk{flex:0 0 auto;width:24px;height:24px;border-radius:7px;border:2px solid #cdd6e6;display:grid;place-items:center;
  font-weight:800;color:#fff;background:#fff;transition:.2s}
.m-chk.done{background:var(--ok);border-color:var(--ok)}
.m-body{flex:1;min-width:0}
.m-body .mt{font-weight:600;font-size:.93rem}
.m-body .mh{font-size:.82rem;color:var(--muted);margin-top:2px}
.m-body code{background:#eef2f9;padding:1px 6px;border-radius:5px;font-size:.82rem;color:var(--navy)}

/* terminal */
.term-wrap{margin:18px 0;border-radius:12px;overflow:hidden;box-shadow:0 10px 30px rgba(13,19,32,.35);border:1px solid #0a0f1a}
.term-bar{background:var(--term-bar);display:flex;align-items:center;gap:8px;padding:9px 12px}
.term-bar .dots{display:flex;gap:6px}
.term-bar .dots i{width:12px;height:12px;border-radius:50%;display:block}
.term-bar .dots i:nth-child(1){background:#ff5f57}
.term-bar .dots i:nth-child(2){background:#febc2e}
.term-bar .dots i:nth-child(3){background:#28c840}
.term-bar .ttl{color:#9fb0cc;font-family:var(--mono);font-size:.78rem;margin-left:6px}
.term-bar .reset{margin-left:auto;background:rgba(255,255,255,.08);color:#9fb0cc;border:0;border-radius:6px;
  padding:5px 10px;font-size:.74rem;cursor:pointer;font-family:var(--mono)}
.term-bar .reset:hover{background:rgba(255,255,255,.16);color:#fff}
.term{background:var(--term-bg);color:var(--term-text);font-family:var(--mono);font-size:.86rem;
  padding:12px 14px;height:340px;overflow-y:auto}
.term .line{white-space:pre-wrap;word-break:break-word}
.term .ps{color:var(--term-green)}
.term .ps .path{color:#5db3ff}
.term .err{color:#ff7b7b}
.term .ok{color:#7ee2a8}
.term-input{display:flex;align-items:center;background:var(--term-bg);padding:6px 14px 12px;font-family:var(--mono)}
.term-input .prompt{color:var(--term-green);white-space:nowrap;margin-right:8px;font-size:.86rem}
.term-input .prompt .path{color:#5db3ff}
.term-input input{flex:1;background:transparent;border:0;color:#fff;font-family:var(--mono);font-size:.86rem;outline:none}
.hintbar{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.hintbar button{background:#eef2f9;border:1px solid var(--line);color:var(--navy);border-radius:7px;
  padding:5px 9px;font-size:.76rem;font-family:var(--mono);cursor:pointer}
.hintbar button:hover{background:#e0e8f6}

/* tables */
.tbl{width:100%;border-collapse:collapse;margin:14px 0;background:var(--panel);border-radius:10px;overflow:hidden;
  box-shadow:var(--shadow);font-size:.88rem}
.tbl th{background:var(--navy);color:#fff;text-align:left;padding:9px 12px;font-size:.8rem;letter-spacing:.3px}
.tbl td{padding:8px 12px;border-top:1px solid var(--line)}
.tbl tr:nth-child(even) td{background:#f7f9fd}
.tbl code{background:#eef2f9;padding:1px 6px;border-radius:5px;color:var(--navy)}


/* quiz */
.quiz-meta{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:8px 0 18px}
.pill{background:#eef2f9;border:1px solid var(--line);border-radius:999px;padding:5px 13px;font-size:.8rem;color:var(--navy);font-weight:600}
.q{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 16px;margin-bottom:13px;box-shadow:var(--shadow)}
.q .qn{display:flex;gap:9px;align-items:flex-start;margin-bottom:10px}
.q .qn .qi{flex:0 0 auto;width:28px;height:28px;border-radius:8px;background:var(--teal);color:#fff;
  display:grid;place-items:center;font-weight:700;font-size:.82rem;font-family:var(--mono)}
.q .qn .qt{font-weight:600;padding-top:3px}
.q .badge{font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-left:auto;
  border:1px solid var(--line);border-radius:6px;padding:2px 7px;align-self:flex-start}
.opts{display:grid;gap:7px}
.opt{display:flex;gap:9px;align-items:center;border:1px solid var(--line);border-radius:9px;padding:9px 12px;cursor:pointer;font-size:.9rem;transition:.12s}
.opt:hover{border-color:var(--teal)}
.opt input{accent-color:var(--teal)}
.opt.correct{background:#e9f7ee;border-color:var(--ok)}
.opt.wrong{background:#fcebeb;border-color:var(--bad)}
.q input[type=text]{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-family:var(--mono);font-size:.9rem}
.q .feedback{margin-top:10px;font-size:.85rem;padding:8px 11px;border-radius:8px;display:none}
.q .feedback.show{display:block}
.q .feedback.good{background:#e9f7ee;color:#1c5b34}
.q .feedback.poor{background:#fcebeb;color:#8d2b2b}
.btn{display:inline-flex;align-items:center;gap:8px;border:0;border-radius:10px;padding:11px 20px;font-size:.92rem;
  font-weight:600;cursor:pointer;font-family:var(--sans);transition:.15s}
.btn.primary{background:var(--teal);color:#fff}
.btn.primary:hover{background:#0a5d60}
.btn.navy{background:var(--navy);color:#fff}
.btn.navy:hover{background:#16294a}
.btn.amber{background:var(--amber);color:#fff}
.btn.amber:hover{background:#9c7109}
.btn.ghost{background:#eef2f9;color:var(--navy)}
.btn[disabled]{opacity:.45;cursor:not-allowed}
.result{margin-top:18px;border-radius:14px;padding:20px;text-align:center;display:none;box-shadow:var(--shadow)}
.result.show{display:block}
.result.pass{background:linear-gradient(135deg,#e7f6f6,#eafaf0);border:2px solid var(--ok)}
.result.fail{background:#fdeee9;border:2px solid var(--bad)}
.result .score{font-size:2.6rem;font-weight:800;font-family:var(--mono)}
.result.pass .score{color:var(--ok)}
.result.fail .score{color:var(--bad)}

/* attestation */
.cert-box{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:var(--shadow);text-align:center}
.cert-locked{color:var(--muted);font-size:.95rem}
.cert-preview{border:3px double var(--amber);border-radius:10px;padding:26px;margin:18px 0;background:#fffdf7;text-align:center}
.cert-preview .ct{font-family:Georgia,serif;font-size:1.5rem;color:var(--navy);font-weight:700}
.cert-preview .cn{font-size:1.7rem;color:var(--amber);font-weight:800;margin:12px 0;font-family:Georgia,serif}
.cert-preview .cl{color:var(--muted);font-size:.9rem}
.foot{margin-top:34px;text-align:center;color:var(--muted);font-size:.82rem;padding:20px}

/* ---------- RESPONSIVE ---------- */
@media (max-width:1100px){ main.content{padding:22px 20px 60px} }
@media (max-width:900px){
  .burger{display:grid;place-items:center}
  nav.side{position:fixed;left:0;top:0;height:100vh;z-index:60;transform:translateX(-100%);
    transition:transform .28s ease;width:280px;box-shadow:4px 0 30px rgba(0,0,0,.25);padding-top:18px}
  nav.side.open{transform:translateX(0)}
  .overlay{display:block;position:fixed;inset:0;background:rgba(10,15,26,.45);z-index:50;opacity:0;
    pointer-events:none;transition:opacity .25s}
  .overlay.show{opacity:1;pointer-events:auto}
  .progress-wrap .lab{display:none}
  .bar{width:90px}
  .namebox label{display:none}
  .namebox input{width:130px}
  .layout{min-height:auto}
}
@media (max-width:620px){
  body{font-size:15px}
  .top-inner{padding:10px 12px;gap:10px}
  .brand .t{font-size:.9rem}
  .brand .s{display:none}
  .tux{display:none}
  .namebox{display:none}
  main.content{padding:18px 14px 50px}
  .part h2{font-size:1.35rem}
  .kv{grid-template-columns:1fr;gap:4px}
  .kv .k{padding-top:0}
  .term{height:300px;font-size:.8rem}
  .result .score{font-size:2.1rem}
  .cert-preview{padding:16px}
  .cert-preview .cn{font-size:1.3rem}
}
@media (min-width:760px){ .cmd-grid{grid-template-columns:1fr 1fr} }

/* figures pédagogiques */
.fig{margin:18px 0;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px 10px;box-shadow:var(--shadow);overflow:hidden}
.fig svg{width:100%;height:auto;display:block}
.fig-title{font-weight:700;color:var(--navy);font-size:1rem;margin:0 0 10px;display:flex;align-items:center;gap:9px}
.fig-title .ic{min-width:27px;height:27px;padding:0 7px;border-radius:8px;background:linear-gradient(135deg,var(--teal),var(--teal-2));color:#fff;display:grid;place-items:center;font-size:.82rem;font-weight:700;flex:0 0 auto}
.fig-cap{font-size:.82rem;color:var(--muted);font-style:italic;text-align:center;margin-top:8px;line-height:1.4}
.fig .hl{transition:filter .15s}
.fig .hl:hover{filter:brightness(1.05)}
@keyframes figdash{to{stroke-dashoffset:-22}}
.fig .flow{stroke-dasharray:6 5;animation:figdash 1.1s linear infinite}
@keyframes figblink{50%{opacity:0}}
.fig .cursor{animation:figblink 1s step-end infinite}

/* simulateur d'administration */
.adminsim{margin:22px 0;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);background:var(--panel)}
.adminsim .head{background:linear-gradient(100deg,var(--navy),var(--navy-2));color:#fff;padding:12px 16px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.adm-id{margin-left:auto;font-size:.78rem;background:rgba(255,255,255,.16);padding:5px 11px;border-radius:999px;font-family:var(--mono)}
.adm-screen{background:var(--term-bg);color:var(--term-text);font-family:var(--mono);font-size:.85rem;padding:14px;height:230px;overflow-y:auto;line-height:1.55}
.adm-screen .line{white-space:pre-wrap;word-break:break-word}
.adm-screen .ps{color:var(--term-green);font-weight:700}
.adm-screen .res{color:#cdd9ee}
.adm-screen .err{color:#ff8a8a}
.adm-screen .ok{color:var(--term-green)}
.adm-screen .warn{color:#ffd479}
.adm-screen .muted{color:#7f90ad}
.adm-screen .expl{color:#7fd9dd;font-style:italic}
.adm-screen code{background:rgba(255,255,255,.1);padding:1px 5px;border-radius:5px;color:#fff}
.adm-body{padding:14px 16px}
.adm-grp{margin:12px 0}
.adm-grp h5{margin:0 0 8px;color:var(--navy);font-size:.78rem;text-transform:uppercase;letter-spacing:.6px}
.adm-btns{display:flex;flex-wrap:wrap;gap:8px}
.adm-btn{font-family:var(--mono);font-size:.82rem;background:#fff;border:1.5px solid var(--teal);color:var(--navy);padding:7px 11px;border-radius:9px;cursor:pointer;transition:.15s}
.adm-btn:hover{background:var(--teal);color:#fff}
.adm-btn.root{border-color:var(--amber)}
.adm-btn.root:hover{background:var(--amber)}
.adm-legend{margin-top:14px;background:#eaf0fb;border:1px solid var(--line);border-left:5px solid var(--amber);border-radius:11px;padding:12px 14px;font-size:.88rem;line-height:1.6}
.adm-legend code{background:#fff;border:1px solid var(--line);padding:1px 6px;border-radius:6px;font-family:var(--mono);color:var(--navy)}

/* simulateur "tout est fichier" */
.filesim{margin:18px 0;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);background:var(--panel)}
.filesim .head{background:linear-gradient(100deg,var(--teal),var(--teal-2));color:#fff;padding:12px 16px;font-weight:700}
.filesim .head code{background:rgba(255,255,255,.18);padding:1px 6px;border-radius:5px;color:#fff;font-family:var(--mono)}
.fs-grid{display:grid;grid-template-columns:1fr;gap:14px;padding:14px 16px}
@media(min-width:820px){.fs-grid{grid-template-columns:1.3fr 1fr}}
.fs-term{background:var(--term-bg);border-radius:11px;padding:12px;font-family:var(--mono);font-size:.84rem;color:var(--term-text);overflow-x:auto}
.fs-prompt{color:#9fb3d1;margin-bottom:6px;white-space:nowrap}
.fs-prompt .ps{color:var(--term-green);font-weight:700}
.fs-row{white-space:nowrap;padding:3px 6px;border-radius:6px;cursor:pointer;transition:.12s;border-left:3px solid transparent}
.fs-row:hover{background:rgba(255,255,255,.06)}
.fs-row.active{background:rgba(20,163,168,.16);border-left-color:var(--teal-2)}
.fs-row .t{font-weight:800;font-size:1.05em;margin-right:1px}
.fs-row .rest{color:#b9c6dd}
.fs-hint{font-size:.8rem;color:var(--muted);font-style:italic;margin-top:8px}
.fs-detail{border:1px solid var(--line);border-radius:12px;padding:14px;display:grid;grid-template-columns:auto 1fr auto;grid-template-areas:"sym main icon" "desc desc desc";gap:10px 12px;align-content:start}
.fs-sym{grid-area:sym;width:52px;height:52px;border-radius:12px;color:#fff;font-family:var(--mono);font-weight:800;font-size:1.8rem;display:grid;place-items:center}
.fs-dmain{grid-area:main;align-self:center}
.fs-tname{font-weight:700;color:var(--navy);font-size:1.05rem}
.fs-tex{font-size:.85rem;color:var(--muted);margin-top:3px}
.fs-tex code{background:#f0f3f9;padding:1px 6px;border-radius:5px;font-family:var(--mono);color:var(--navy)}
.fs-dicon{grid-area:icon;align-self:center}
.fs-desc{grid-area:desc;margin:2px 0 0;font-size:.9rem;color:var(--ink);line-height:1.5}
.fs-anatomy{padding:0 16px 14px}
.fs-anatitle{font-size:.85rem;color:var(--muted);margin-bottom:8px}
.fs-anatitle code{font-family:var(--mono);color:var(--navy)}
.fs-chips{display:flex;flex-wrap:wrap;gap:8px}
.fs-chip{background:#f4f6fb;border:1px solid var(--line);border-radius:9px;padding:6px 10px;text-align:center;min-width:48px}
.fs-chip .v{display:block;font-family:var(--mono);font-weight:700;color:var(--navy);font-size:.9rem}

<script>
/* ============================================================
   ATELIER LINUX — moteur, contenu, terminal, quiz, attestation
   ============================================================ */

/* ---------- 1. SYSTÈME DE FICHIERS VIRTUEL ---------- */
function D(perms,owner,group){return{type:'dir',perms:perms||'755',owner:owner||'etudiant',group:group||'etudiant',children:{}};}
function F(content,perms,owner,group){return{type:'file',perms:perms||'644',owner:owner||'etudiant',group:group||'etudiant',content:content||''};}

let root, state;
function initFS(){
  root = D('755','root','root');
  root.children.bin  = D('755','root','root');
  root.children.usr  = D('755','root','root');
  root.children.etc  = D('755','root','root');
  root.children.tmp  = D('777','root','root');
  root.children.var  = D('755','root','root');
  root.children.var.children.log = D('755','root','root');
  root.children.var.children.log.children['syslog'] =
    F('Jan 12 09:00 srv-linux systemd: Demarrage du systeme\nJan 12 09:01 srv-linux sshd: service pret\nJan 12 09:03 srv-linux kernel: erreur lecture disque /dev/sdb (reessai)\nJan 12 09:04 srv-linux systemd: tout est operationnel','640','root','root');
  root.children.home = D('755','root','root');
  const u = D('755','etudiant','etudiant');
  u.children['notes.txt'] = F('Bienvenue dans l\'atelier Linux du Pr. KHIAT.\nObjectif : monter un mini serveur pour une petite entreprise.\n');
  u.children['journal.log'] = F('[INFO] service web demarre\n[WARN] memoire un peu haute\n[ERREUR] connexion base de donnees impossible\n[INFO] reprise normale\n');
  root.children.home.children.etudiant = u;

  state = {
    cwd:'/home/etudiant', user:'etudiant', host:'srv-linux',
    history:[], jobs:[], pidSeq:2400, umask:'022',
    users:{ root:{primary:'root',groups:['root']}, etudiant:{primary:'etudiant',groups:['etudiant','sudo']} },
    groups:{ root:{}, etudiant:{}, sudo:{members:['etudiant']} }
  };
}
initFS();

/* path helpers */
function splitPath(p){return p.split('/').filter(x=>x!=='');}
function absPath(p){
  if(p===undefined||p==='') return state.cwd;
  if(p==='~') return '/home/'+state.user;
  if(p.startsWith('~/')) p='/home/'+state.user+'/'+p.slice(2);
  let base = p.startsWith('/') ? [] : splitPath(state.cwd);
  for(const seg of splitPath(p)){
    if(seg==='.') continue;
    else if(seg==='..') base.pop();
    else base.push(seg);
  }
  return '/'+base.join('/');
}
function getNode(abs){
  if(abs==='/'||abs==='') return root;
  let cur=root;
  for(const seg of splitPath(abs)){
    if(!cur||cur.type!=='dir'||!cur.children[seg]) return null;
    cur=cur.children[seg];
  }
  return cur;
}
function getParent(abs){const parts=splitPath(abs);const name=parts.pop();return {parent:getNode('/'+parts.join('/')),name};}
function shortPath(abs){const home='/home/'+state.user; return abs===home?'~':abs.startsWith(home+'/')?'~'+abs.slice(home.length):abs;}

/* permissions */
function permStr(node){
  const t=node.type==='dir'?'d':'-';
  const oct=(node.perms||'644').padStart(3,'0').slice(-3);
  const map=['---','--x','-w-','-wx','r--','r-x','rw-','rwx'];
  let s=t; for(const ch of oct) s+=map[+ch]||'---'; return s;
}
function applySymbolic(oct, spec){
  oct=(oct||'644').padStart(3,'0').slice(-3);
  let c={u:+oct[0],g:+oct[1],o:+oct[2]};
  spec.split(',').forEach(part=>{
    const m=part.match(/^([ugoa]*)([+\-=])([rwxX]+)$/); if(!m) return;
    let who=m[1]||'a', op=m[2], val=0;
    if(m[3].includes('r'))val+=4; if(m[3].includes('w'))val+=2;
    if(m[3].includes('x')||m[3].includes('X'))val+=1;
    const classes = who==='a' ? ['u','g','o'] : who.split('');
    classes.forEach(cl=>{
      if(op==='+') c[cl]=c[cl]|val;
      else if(op==='-') c[cl]=c[cl]&~val;
      else c[cl]=val;
    });
  });
  return ''+c.u+c.g+c.o;
}

/* ---------- 2. MOTEUR DE COMMANDES ---------- */
const ok=(t)=>({text:(t===undefined?'':t),err:false});
const er=(t)=>({text:t,err:true});

function tokenize(line){
  const re=/"([^"]*)"|'([^']*)'|(\S+)/g; let m,out=[];
  while((m=re.exec(line))) out.push(m[1]!==undefined?m[1]:(m[2]!==undefined?m[2]:m[3]));
  return out;
}
const KNOWN_BINS={ls:'/bin/ls',cd:'shell',pwd:'/bin/pwd',cat:'/bin/cat',cp:'/bin/cp',mv:'/bin/mv',rm:'/bin/rm',
  mkdir:'/bin/mkdir',touch:'/usr/bin/touch',chmod:'/bin/chmod',chown:'/bin/chown',grep:'/bin/grep',find:'/usr/bin/find',
  nano:'/bin/nano',bash:'/bin/bash',sudo:'/usr/bin/sudo',apt:'/usr/bin/apt',top:'/usr/bin/top',ps:'/bin/ps',
  systemctl:'/usr/bin/systemctl',python3:'/usr/bin/python3',ssh:'/usr/bin/ssh'};

const HELP={
  pwd:'pwd — affiche le repertoire de travail courant.',
  ls:'ls — liste le contenu d\'un repertoire. Options: -l (detail), -a (caches).',
  cd:'cd [chemin] — change de repertoire. cd .. (parent), cd ~ (accueil).',
  mkdir:'mkdir [-p] nom — cree un repertoire. -p cree les parents manquants.',
  chmod:'chmod mode fichier — modifie les permissions. Ex: chmod 755 / chmod +x.',
  chown:'chown user[:groupe] fichier — change le proprietaire.',
  find:'find chemin -name motif — recherche des fichiers par nom.',
  grep:'grep [-i] motif fichier — recherche un texte dans un fichier.',
  adduser:'adduser nom — cree un nouvel utilisateur (privilege root).',
  ps:'ps — affiche les processus en cours. Variante: ps aux.',
  kill:'kill PID — termine un processus identifie par son PID.'
};

function listDir(node, opts){
  let names=Object.keys(node.children);
  if(!opts.all) names=names.filter(n=>!n.startsWith('.'));
  names.sort((a,b)=>a.localeCompare(b));
  if(opts.all) names=['.','..',...names];
  if(opts.long){
    let lines=['total '+names.length];
    names.forEach(n=>{
      let child = (n==='.'||n==='..')?node:node.children[n];
      const size = child.type==='dir'?4096:(child.content?child.content.length:0);
      lines.push(`${permStr(child)} 1 ${child.owner} ${child.group} ${String(size).padStart(5)} jan 12 09:00 ${child.type==='dir'?'\x01'+n+'\x01':n}`);
    });
    return lines.join('\n');
  }
  return names.map(n=>{
    let child=(n==='.'||n==='..')?node:node.children[n];
    return child.type==='dir'?'\x01'+n+'\x01':n;
  }).join('  ');
}
function treeView(node,prefix,acc){
  const names=Object.keys(node.children).filter(n=>!n.startsWith('.')).sort();
  names.forEach((n,i)=>{
    const last=i===names.length-1, child=node.children[n];
    acc.push(prefix+(last?'└── ':'├── ')+(child.type==='dir'?'\x01'+n+'\x01':n));
    if(child.type==='dir') treeView(child,prefix+(last?'    ':'│   '),acc);
  });
  return acc;
}

const CMD={
  pwd:()=>ok(state.cwd),
  whoami:()=>ok(state.user),
  hostname:()=>ok(state.host),
  date:()=>ok(new Date().toLocaleString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})),
  cal:()=>{
    const d=new Date(),y=d.getFullYear(),m=d.getMonth();
    const months=['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre'];
    let head=`     ${months[m]} ${y}`, week='Lu Ma Me Je Ve Sa Di', rows=[];
    let first=(new Date(y,m,1).getDay()+6)%7, days=new Date(y,m+1,0).getDate();
    let row='   '.repeat(first), c=first;
    for(let day=1;day<=days;day++){row+=String(day).padStart(2)+' ';if(++c%7===0){rows.push(row.trimEnd());row='';}}
    if(row.trim())rows.push(row.trimEnd());
    return ok([head,week,...rows].join('\n'));
  },
  clear:()=>({clear:true}),
  history:()=>ok(state.history.map((h,i)=>String(i+1).padStart(4)+'  '+h).join('\n')),
  echo:(a)=>ok(a.join(' ')),
  man:(a)=>ok(HELP[a[0]]?HELP[a[0]]+'\n\n(Page de manuel abregee. Tapez q pour quitter dans un vrai systeme.)':'Aucune page de manuel pour '+(a[0]||'')),
  ls:(a)=>{
    const flags=a.filter(x=>x.startsWith('-')).join('');
    const opts={long:flags.includes('l'),all:flags.includes('a')};
    const target=a.find(x=>!x.startsWith('-'));
    const abs=absPath(target); const node=getNode(abs);
    if(!node) return er('ls: impossible d\'acceder a \''+target+'\': Aucun fichier ou dossier de ce type');
    if(node.type==='file'){
      if(opts.long){
        const size=node.content?node.content.length:0;
        const nm=(target||'').split('/').pop();
        return ok(`${permStr(node)} 1 ${node.owner} ${node.group} ${String(size).padStart(5)} jan 12 09:00 ${nm}`);
      }
      return ok((target||'').split('/').pop());
    }
    return ok(listDir(node,opts));
  },
  cd:(a)=>{
    const t=a[0]||'~'; const abs=absPath(t); const node=getNode(abs);
    if(!node) return er('cd: '+t+': Aucun fichier ou dossier de ce type');
    if(node.type!=='dir') return er('cd: '+t+': N\'est pas un repertoire');
    state.cwd=abs; return ok('');
  },
  tree:()=>{const node=getNode(state.cwd);const acc=treeView(node,'',[]);return ok('.\n'+acc.join('\n')+'\n\n'+acc.filter(l=>l.includes('\x01')).length+' repertoire(s)');},
  mkdir:(a)=>{
    const p=a.includes('-p'); const targets=a.filter(x=>!x.startsWith('-'));
    if(!targets.length) return er('mkdir: operande manquant');
    for(const t of targets){
      const abs=absPath(t);
      if(p){ // create chain
        let parts=splitPath(abs),cur=root;
        for(const seg of parts){ if(!cur.children[seg]) cur.children[seg]=D(); else if(cur.children[seg].type!=='dir') return er('mkdir: '+t+': Le fichier existe'); cur=cur.children[seg]; }
      } else {
        const {parent,name}=getParent(abs);
        if(!parent||parent.type!=='dir') return er('mkdir: impossible de creer le repertoire \''+t+'\': Aucun fichier ou dossier de ce type');
        if(parent.children[name]) return er('mkdir: impossible de creer le repertoire \''+t+'\': Le fichier existe');
        parent.children[name]=D();
      }
    }
    return ok('');
  },
  touch:(a)=>{
    const targets=a.filter(x=>!x.startsWith('-'));
    for(const t of targets){
      const abs=absPath(t);const {parent,name}=getParent(abs);
      if(!parent||parent.type!=='dir') return er('touch: impossible de faire un touch sur \''+t+'\': Aucun fichier ou dossier de ce type');
      if(!parent.children[name]) parent.children[name]=F('');
    }
    return ok('');
  },
  cat:(a)=>{
    const targets=a.filter(x=>!x.startsWith('-'));
    if(!targets.length) return er('cat: operande manquant');
    let out=[];
    for(const t of targets){const n=getNode(absPath(t));
      if(!n) return er('cat: '+t+': Aucun fichier ou dossier de ce type');
      if(n.type==='dir') return er('cat: '+t+': est un repertoire');
      out.push(n.content);
    }
    return ok(out.join('').replace(/\n$/,''));
  },
  nano:(a)=>ok('[nano] Editeur interactif non disponible dans le simulateur.\nAstuce : utilisez  echo "votre texte" > '+(a[0]||'fichier.txt')+'  pour ecrire dans un fichier.'),
  echo_redir:null,
  cp:(a)=>{
    const rec=a.includes('-r')||a.includes('-R');const f=a.filter(x=>!x.startsWith('-'));
    if(f.length<2) return er('cp: operande fichier manquant');
    const src=getNode(absPath(f[0])); if(!src) return er('cp: impossible d\'evaluer \''+f[0]+'\': Aucun fichier ou dossier de ce type');
    if(src.type==='dir'&&!rec) return er('cp: -r non specifie ; omission du repertoire \''+f[0]+'\'');
    let destAbs=absPath(f[1]); let destNode=getNode(destAbs);
    const clone=(n)=> n.type==='dir'? (()=>{const d=D(n.perms,n.owner,n.group);for(const k in n.children)d.children[k]=clone(n.children[k]);return d;})() : F(n.content,n.perms,n.owner,n.group);
    if(destNode&&destNode.type==='dir'){const {name}=getParent(absPath(f[0]));destNode.children[name]=clone(src);}
    else{const {parent,name}=getParent(destAbs); if(!parent) return er('cp: impossible de creer \''+f[1]+'\'');parent.children[name]=clone(src);}
    return ok('');
  },
  mv:(a)=>{
    const f=a.filter(x=>!x.startsWith('-'));
    if(f.length<2) return er('mv: operande fichier manquant');
    const srcAbs=absPath(f[0]);const src=getNode(srcAbs);
    if(!src) return er('mv: impossible d\'evaluer \''+f[0]+'\': Aucun fichier ou dossier de ce type');
    const sp=getParent(srcAbs);
    let destAbs=absPath(f[1]);let destNode=getNode(destAbs);
    if(destNode&&destNode.type==='dir'){destNode.children[sp.name]=src;delete sp.parent.children[sp.name];}
    else{const dp=getParent(destAbs);if(!dp.parent)return er('mv: impossible de deplacer');dp.parent.children[dp.name]=src;delete sp.parent.children[sp.name];}
    return ok('');
  },
  rm:(a)=>{
    const rec=a.includes('-r')||a.includes('-R')||a.includes('-rf')||a.includes('-fr');
    const f=a.filter(x=>!x.startsWith('-'));
    if(!f.length) return er('rm: operande manquant');
    for(const t of f){const abs=absPath(t);const n=getNode(abs);
      if(!n) return er('rm: impossible de supprimer \''+t+'\': Aucun fichier ou dossier de ce type');
      if(n.type==='dir'&&!rec) return er('rm: impossible de supprimer \''+t+'\': est un repertoire');
      const {parent,name}=getParent(abs);delete parent.children[name];
    }
    return ok('');
  },
  rmdir:(a)=>{
    const f=a.filter(x=>!x.startsWith('-'));
    for(const t of f){const abs=absPath(t);const n=getNode(abs);
      if(!n) return er('rmdir: '+t+': Aucun fichier ou dossier de ce type');
      if(n.type!=='dir') return er('rmdir: '+t+': N\'est pas un repertoire');
      if(Object.keys(n.children).length) return er('rmdir: impossible de supprimer \''+t+'\': Le repertoire n\'est pas vide');
      const {parent,name}=getParent(abs);delete parent.children[name];
    }
    return ok('');
  },
  head:(a)=>{let n=10;const ni=a.indexOf('-n');if(ni>=0)n=+a[ni+1];const f=a.filter(x=>!x.startsWith('-')&&isNaN(x));const node=getNode(absPath(f[0]));if(!node)return er('head: '+f[0]+': Aucun fichier de ce type');return ok(node.content.replace(/\n$/,'').split('\n').slice(0,n).join('\n'));},
  tail:(a)=>{let n=10;const ni=a.indexOf('-n');if(ni>=0)n=+a[ni+1];const f=a.filter(x=>!x.startsWith('-')&&isNaN(x));const node=getNode(absPath(f[0]));if(!node)return er('tail: '+f[0]+': Aucun fichier de ce type');const L=node.content.replace(/\n$/,'').split('\n');return ok(L.slice(Math.max(0,L.length-n)).join('\n'));},
  less:(a)=>CMD.cat(a),
  more:(a)=>CMD.cat(a),
  wc:(a)=>{const flags=a.filter(x=>x.startsWith('-')).join('');const f=a.filter(x=>!x.startsWith('-'));const n=getNode(absPath(f[0]));if(!n)return er('wc: '+f[0]+': Aucun fichier de ce type');const c=n.content;const lines=c.split('\n').length-(c.endsWith('\n')?1:0);const words=c.split(/\s+/).filter(Boolean).length;const chars=c.length;if(flags.includes('l'))return ok(lines+' '+f[0]);if(flags.includes('w'))return ok(words+' '+f[0]);return ok(`${lines} ${words} ${chars} ${f[0]}`);},
  chmod:(a)=>{
    const f=a.filter(x=>!x.startsWith('-'));const mode=f[0];const targets=f.slice(1);
    if(!mode||!targets.length) return er('chmod: operande manquant');
    for(const t of targets){const n=getNode(absPath(t));if(!n)return er('chmod: impossible d\'acceder a \''+t+'\': Aucun fichier ou dossier de ce type');
      if(/^[0-7]{3,4}$/.test(mode)) n.perms=mode.slice(-3);
      else n.perms=applySymbolic(n.perms,mode);
    }
    return ok('');
  },
  chown:(a)=>{const f=a.filter(x=>!x.startsWith('-'));const spec=f[0];const targets=f.slice(1);if(!spec||!targets.length)return er('chown: operande manquant');const [u,g]=spec.split(':');for(const t of targets){const n=getNode(absPath(t));if(!n)return er('chown: impossible d\'acceder a \''+t+'\'');if(u)n.owner=u;if(g)n.group=g;}return ok('');},
  chgrp:(a)=>{const f=a.filter(x=>!x.startsWith('-'));const g=f[0];for(const t of f.slice(1)){const n=getNode(absPath(t));if(!n)return er('chgrp: impossible d\'acceder a \''+t+'\'');n.group=g;}return ok('');},
  umask:(a)=>{if(a[0]){state.umask=a[0];return ok('');}return ok(state.umask);},
  adduser:(a)=>{const name=a.filter(x=>!x.startsWith('-'))[0];if(!name)return er('adduser: nom d\'utilisateur manquant');if(state.users[name])return er('adduser: l\'utilisateur \''+name+'\' existe deja.');if(state.user!=='root')return er('adduser: seul root peut creer un utilisateur. Utilisez sudo.');state.users[name]={primary:name,groups:[name]};state.groups[name]={};root.children.home.children[name]=D('755',name,name);return ok('Ajout de l\'utilisateur \''+name+'\' ...\nCreation du repertoire personnel \'/home/'+name+'\'...\nMot de passe defini, utilisateur cree avec succes.');},
  passwd:(a)=>ok('Changement du mot de passe pour '+(a[0]||state.user)+'.\nNouveau mot de passe : ********\nRetapez : ********\npasswd: mot de passe mis a jour avec succes'),
  usermod:(a)=>{const aG=a.indexOf('-aG');if(aG>=0){const grp=a[aG+1];const user=a[aG+2];if(!state.users[user])return er('usermod: l\'utilisateur \''+user+'\' n\'existe pas');if(!state.groups[grp])return er('usermod: le groupe \''+grp+'\' n\'existe pas');if(!state.users[user].groups.includes(grp))state.users[user].groups.push(grp);return ok('');}return ok('');},
  userdel:(a)=>{const name=a.filter(x=>!x.startsWith('-'))[0];if(!state.users[name])return er('userdel: l\'utilisateur \''+name+'\' n\'existe pas');delete state.users[name];return ok('');},
  groupadd:(a)=>{const g=a[0];if(state.groups[g])return er('groupadd: le groupe \''+g+'\' existe deja');state.groups[g]={};return ok('');},
  groupdel:(a)=>{const g=a[0];if(!state.groups[g])return er('groupdel: le groupe \''+g+'\' n\'existe pas');delete state.groups[g];return ok('');},
  groups:(a)=>{const u=a[0]||state.user;if(!state.users[u])return er('groups: \''+u+'\' : utilisateur inexistant');return ok(u+' : '+state.users[u].groups.join(' '));},

/* exec : parse + redirection + sudo + background */
function exec(line){
  line=line.trim();
  if(line==='') return {text:''};
  state.history.push(line);
  let tokens=tokenize(line);
  let bg=false; if(tokens[tokens.length-1]==='&'){bg=true;tokens.pop();}
  let redir=null;
  for(let i=0;i<tokens.length;i++){ if(tokens[i]==='>'||tokens[i]==='>>'){ redir={mode:tokens[i],file:tokens[i+1]}; tokens=tokens.slice(0,i); break; } }
  let sudo=false; if(tokens[0]==='sudo'){sudo=true;tokens.shift();}
  let cmd=tokens[0]; let args=tokens.slice(1);
  if(!cmd) return {text:''};
  if(args.includes('--help')) return ok(HELP[cmd]?HELP[cmd]:cmd+' : aide abregee non disponible dans le simulateur.');
  let res;
  const prevUser=state.user; if(sudo) state.user='root';
  try{
    if(!CMD[cmd]) res=er(cmd+' : commande introuvable');
    else res=CMD[cmd](args,{bg,raw:line});
  }catch(e){ res=er(cmd+' : erreur de syntaxe ('+e.message+')'); }
  if(sudo) state.user=prevUser;
  if(res&&res.clear) return res;
  if(!res) res=ok('');
  if(redir&&!res.err){
    const abs=absPath(redir.file);const {parent,name}=getParent(abs);
    if(!parent||parent.type!=='dir') return er('bash: '+redir.file+': Aucun fichier ou dossier de ce type');
    const data=res.text+(res.text!==''?'\n':'');
    if(redir.mode==='>>'&&parent.children[name]&&parent.children[name].type==='file') parent.children[name].content+=data;
    else parent.children[name]=F(data);
    return {text:''};
  }
  return res;
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderTerm(t){
  return escapeHtml(t)
    .replace(/\x01([^\x01]*)\x01/g,'<span style="color:#5db3ff;font-weight:600">$1</span>')
    .replace(/\x02([^\x02]*)\x02/g,'<span class="ok">$1</span>');
}
const TERMS=[];
function refreshPrompts(){
  TERMS.forEach(t=>{ t.promptEl.innerHTML=`${state.user}@${state.host}:<span class="path">${shortPath(state.cwd)}</span>$`; });
}
function createTerminal(host, hints){
  host.innerHTML=`
   <div class="term-wrap">
     <div class="term-bar"><div class="dots"><i></i><i></i><i></i></div>
       <span class="ttl">${state.user}@srv-linux: ~</span>
       <button class="reset" type="button">réinitialiser</button></div>
     <div class="term" tabindex="0"></div>
     <div class="term-input"><span class="prompt"></span><input type="text" autocomplete="off" spellcheck="false" aria-label="Commande Linux"></div>
   </div>
   <div class="hintbar"></div>`;
  const termEl=host.querySelector('.term');
  const input=host.querySelector('.term-input input');
  const promptEl=host.querySelector('.prompt');
  const hb=host.querySelector('.hintbar');
  let hi=state.history.length;
  const obj={termEl,promptEl,refresh(){promptEl.innerHTML=`${state.user}@${state.host}:<span class="path">${shortPath(state.cwd)}</span>$`;}};
  obj.refresh();
  function out(html,cls){const d=document.createElement('div');d.className='line'+(cls?' '+cls:'');d.innerHTML=html;termEl.appendChild(d);termEl.scrollTop=termEl.scrollHeight;}
  termEl.addEventListener('click',()=>input.focus());
  // welcome
  out('<span class="ok">Bienvenue dans le terminal Linux simulé — atelier Pr. KHIAT.</span>');
  out('Tapez une commande puis Entrée. Astuce : utilisez les boutons ci-dessous.');
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      const line=input.value;
      out(`<span class="ps">${state.user}@${state.host}:<span class="path">${shortPath(state.cwd)}</span>$</span> ${escapeHtml(line)}`);
      const res=exec(line);
      if(res.clear){termEl.innerHTML='';}
      else if(res.text!==''||res.err){ out(renderTerm(res.text), res.err?'err':''); }
      input.value='';hi=state.history.length;
      obj.refresh(); refreshPrompts();
      TERMS.forEach(t=>{const b=t.termEl.parentElement.querySelector('.ttl');if(b)b.textContent=`${state.user}@srv-linux: ${shortPath(state.cwd)}`;});
      if(activePart) verifyPart(activePart);
      saveProgress();
    } else if(e.key==='ArrowUp'){ if(hi>0){hi--;input.value=state.history[hi]||'';} e.preventDefault(); }
    else if(e.key==='ArrowDown'){ if(hi<state.history.length){hi++;input.value=state.history[hi]||'';} e.preventDefault(); }
  });
  (hints||[]).forEach(h=>{const b=document.createElement('button');b.type='button';b.textContent=h;
    b.onclick=()=>{input.value=h;input.focus();};hb.appendChild(b);});
  host.querySelector('.reset').onclick=()=>{
    if(confirm('Réinitialiser le système de fichiers simulé ? (votre progression de quiz est conservée)')){
      const hist=state.history; initFS(); state.history=hist;
      TERMS.forEach(t=>{t.termEl.innerHTML='';t.refresh();});
      out('<span class="ok">Système de fichiers réinitialisé.</span>');
      refreshPrompts();
    }
  };
  TERMS.push(obj);
  return obj;
}

    <div class="m-item" data-i="${i}">

function verifyPart(p){
  if(!MISSIONS[p]) return;
  let all=true;
  MISSIONS[p].forEach((m,i)=>{
    let done=false; try{done=!!m.c();}catch(e){done=false;}
    const chk=document.getElementById('chk-'+p+'-'+i);
    if(chk){chk.classList.toggle('done',done);chk.textContent=done?'✓':'';}
    if(!done) all=false;
  });
  if(all) markComplete(p); else { completed.delete(p); updateProgress(); }
}

function archItem(q,i){
 const body='<div class="opts">'+q.o.map((op,j)=>`<label class="opt" id="aopt-${i}-${j}"><input type="radio" name="aq${i}" value="${j}"> ${escapeHtml(op)}</label>`).join('')+'</div>';

function gradeArch(){
 let score=0;
 ARCH_Q.forEach((q,i)=>{
   const sel=document.querySelector(`input[name="aq${i}"]:checked`);
   let correct=false, chosen=null;
   if(sel){correct=(+sel.value===q.a);chosen=document.getElementById(`aopt-${i}-${sel.value}`);}
   document.getElementById(`aopt-${i}-${q.a}`).classList.add('correct');
   if(chosen&&!correct) chosen.classList.add('wrong');
   if(correct) score++;
   const fb=document.getElementById('afb-'+i);
   fb.className='feedback show '+(correct?'good':'poor');
   fb.textContent=correct?'\u2713 Bonne réponse':'\u2717 Réponse attendue : '+q.o[q.a];
 });
 const r=document.getElementById('archResult');
 const all=score===ARCH_Q.length;
 r.className='result show '+(all?'pass':'fail');
 r.innerHTML=`<div class="score">${score} / ${ARCH_Q.length}</div>
   <div style="font-weight:700;margin:6px 0">${all?'Architecture maîtrisée \u2705':'Revoyez les couches et l\'arborescence, puis réessayez.'}</div>`;
 if(all){markComplete(2);} else {completed.delete(2);updateProgress();}
 saveProgress();
}

}

function buildQuiz(){

   <div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap">
     <button class="btn primary" onclick="gradeQuiz()">Corriger le quiz</button>
     <button class="btn ghost" onclick="resetQuiz()">Recommencer</button>
   </div>
   <div class="result" id="quizResult"></div>`;
}
function quizItem(q,i){
 const badge={qcm:'QCM','vf':'Vrai / Faux',fill:'À compléter',scenario:'Scénario'}[q.ty];
 let body='';
 if(q.ty==='qcm'||q.ty==='scenario'){
   body='<div class="opts">'+q.o.map((op,j)=>`<label class="opt" id="opt-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${escapeHtml(op)}</label>`).join('')+'</div>';
 } else if(q.ty==='vf'){
   body='<div class="opts">'+['Vrai','Faux'].map((op,j)=>`<label class="opt" id="opt-${i}-${j}"><input type="radio" name="q${i}" value="${j===0}"> ${op}</label>`).join('')+'</div>';
 } else {
   body=`<input type="text" id="fill-${i}" placeholder="Tapez la commande…" autocomplete="off">`;
 }
 return `<div class="q" id="q-${i}"><div class="qn"><span class="qi">${i+1}</span><span class="qt">${escapeHtml(q.q)}</span><span class="badge">${badge}</span></div>${body}<div class="feedback" id="fb-${i}"></div></div>`;
}
function norm(s){return (s||'').toLowerCase().replace(/\s+/g,' ').replace(/["']/g,'').trim();}
function gradeQuiz(){
 let score=0;
 QUIZ.forEach((q,i)=>{
   let correct=false, chosenEl=null;
   if(q.ty==='qcm'||q.ty==='scenario'){
     const sel=document.querySelector(`input[name="q${i}"]:checked`);
     if(sel){correct=(+sel.value===q.a);chosenEl=document.getElementById(`opt-${i}-${sel.value}`);}
     document.getElementById(`opt-${i}-${q.a}`).classList.add('correct');
     if(chosenEl&&!correct) chosenEl.classList.add('wrong');
   } else if(q.ty==='vf'){
     const sel=document.querySelector(`input[name="q${i}"]:checked`);
     if(sel){correct=((sel.value==='true')===q.a);}
     document.getElementById(`opt-${i}-${q.a?0:1}`).classList.add('correct');
     if(sel&&!correct) document.getElementById(`opt-${i}-${sel.value==='true'?0:1}`).classList.add('wrong');
   } else {
     const v=norm(document.getElementById('fill-'+i).value);
     correct=q.a.map(norm).includes(v);
   }
   if(correct) score++;
   const fb=document.getElementById('fb-'+i);
   fb.className='feedback show '+(correct?'good':'poor');
   if(correct) fb.textContent='✓ Bonne réponse';
   else {
     let sol = (q.ty==='vf')?(q.a?'Vrai':'Faux'):(q.ty==='fill'?q.a[0]:q.o[q.a]);
     fb.textContent='✗ Réponse attendue : '+sol;
   }
 });
 const pct=Math.round(score/QUIZ.length*100);
 const pass=pct>=70;
 const r=document.getElementById('quizResult');
 r.className='result show '+(pass?'pass':'fail');
 r.innerHTML=`<div class="score">${pct}%</div>
   <div style="font-weight:700;font-size:1.1rem;margin:6px 0">${score} / ${QUIZ.length} bonnes réponses — ${pass?'RÉUSSI ✅':'NON RÉUSSI ❌'}</div>
   <div style="color:var(--muted)">${pass?'Félicitations ! Votre attestation est débloquée dans la partie 12.':'Seuil de 70 % non atteint. Revoyez la correction puis recommencez.'}</div>`;
 r.scrollIntoView({behavior:'smooth',block:'center'});
 quizPassed=pass;
 if(pass){markComplete(11);unlockCert();}
 saveProgress();
}
function resetQuiz(){
 document.getElementById('quizForm').innerHTML=QUIZ.map((q,i)=>quizItem(q,i)).join('');

}

function admPrompt(){ return adminRoot?'root@srv-linux:~#':'etudiant@srv-linux:~$'; }
function refreshPromptAdm(){ const el=document.getElementById('adm-id'); if(el) el.textContent=admPrompt(); }
function admWrite(html,cls){ const scr=document.getElementById('adm-screen'); if(!scr) return;
  const d=document.createElement('div'); d.className='line'+(cls?' '+cls:''); d.innerHTML=html; scr.appendChild(d); scr.scrollTop=scr.scrollHeight; }
function admEcho(cmd){ admWrite('<span class="ps">'+admPrompt()+'</span> '+cmd); }
function admExpl(t){ admWrite('↳ '+t,'expl'); }

function adminRun(cmd){
  if(!document.getElementById('adm-screen')) return;
  // --- élévation / changement d'utilisateur ---
  if(cmd==='su'||cmd==='su -'||cmd==='sudo su'||cmd==='sudo -i'){
    admEcho(cmd);
    if(adminRoot){ admWrite('Vous êtes déjà <b>root</b>.','warn'); }
    else{
      if(cmd.indexOf('sudo')===0){ admWrite('[sudo] mot de passe de etudiant : ********','muted');
        admExpl('sudo su : vous devenez root en tapant VOTRE mot de passe (vous êtes dans le groupe sudo).'); }
      else { admWrite('Mot de passe (root) : ********','muted');
        admExpl('su : vous devenez root en tapant le mot de passe de ROOT. Quittez avec exit.'); }
      adminRoot=true; admWrite('Vous êtes maintenant <b>root</b> — le prompt finit par <b>#</b>.','ok');
    }
    refreshPromptAdm(); return;
  }
  if(cmd==='exit'){
    admEcho(cmd);
    if(adminRoot){ adminRoot=false; admWrite('Retour à l\'utilisateur <b>etudiant</b> — le prompt finit par <b>$</b>.','ok'); }
    else admWrite('Vous êtes déjà un simple utilisateur.','warn');
    refreshPromptAdm(); return;
  }
  // --- commande éventuellement préfixée de sudo ---
  let sudo=false, base=cmd;
  if(cmd.indexOf('sudo ')===0){ sudo=true; base=cmd.slice(5); }
  admEcho(cmd);
  const e=ADMIN_DB[base];
  if(!e){ admWrite('commande inconnue dans ce simulateur','err'); return; }
  const elevated = adminRoot || sudo;
  if(e.root && !elevated){
    admWrite('Permission refusée : opération réservée à l\'administrateur (root).','err');
    admExpl('Relancez avec <code>sudo '+base+'</code>, ou devenez root avec <code>sudo su</code>.');
    return;
  }
  if(sudo && !adminRoot) admWrite('[sudo] mot de passe de etudiant : ********','muted');
  admWrite(e.out(),'res');
  admExpl(e.expl);
}
function adminReset(){
  adminRoot=false;
  const scr=document.getElementById('adm-screen');
  if(scr) scr.innerHTML='<div class="line expl">Console réinitialisée. Vous êtes <b>etudiant</b> ($).</div>';
  refreshPromptAdm();
}

function admBtn(cmd,root){ return '<button class="adm-btn'+(root?' root':'')+'" onclick="adminRun(\''+cmd.replace(/'/g,"\\'")+'\')">'+cmd+'</button>'; }
function admGroup(title,cmds){
  return '<div class="adm-grp"><h5>'+title+'</h5><div class="adm-btns">'+cmds.map(c=>admBtn(c[0],c[1])).join('')+'</div></div>';
}

function buildAdminSim(){
 const groups=[
  ['Élévation de privilèges (sudo · su)', [['whoami',false],['id',false],['su',false],['sudo su',false],['exit',false]]],
  ['Supervision du système', [['uname -a',false],['df -h',false],['free -h',false],['uptime',false],['ps aux',false],['ip a',false]]],
  ['Services', [['systemctl status ssh',false],['systemctl restart ssh',false],['sudo systemctl restart ssh',true],['sudo systemctl stop ssh',true]]],
  ['Journaux système', [['journalctl -xe',false],['sudo journalctl -xe',true]]],
  ['Paquets (APT)', [['apt update',false],['sudo apt update',true],['sudo apt upgrade',true],['sudo apt install htop',true],['sudo apt remove htop',true]]]
 ];
 return `
 <div class="adminsim">
   <div class="head">🛡️ Simulateur d'administration — <span style="font-weight:600">sudo · su · commandes système</span>
     <span class="adm-id" id="adm-id">etudiant@srv-linux:~$</span></div>
   <div class="adm-screen" id="adm-screen">
     <div class="line expl">Cliquez une commande ci-dessous. Les tâches d'administration exigent souvent les droits <b>root</b> (#).</div>
     <div class="line expl">Essayez d'abord <b>apt update</b> (refusé), puis <b>sudo su</b>, puis <b>apt update</b> à nouveau.</div>
   </div>
   <div class="adm-body">
     ${groups.map(g=>admGroup(g[0],g[1])).join('')}
     <div class="adm-legend">
       <b>Repères :</b> <code>$</code> = utilisateur standard · <code>#</code> = root (administrateur).
       <code>sudo cmd</code> exécute <b>une</b> commande en root (demande <i>votre</i> mot de passe).
       <code>su</code> vous fait <b>devenir</b> root pour la session (mot de passe de root) — on quitte avec <code>exit</code>.
     </div>
     <button class="btn ghost" style="margin-top:12px" onclick="adminReset()">Réinitialiser la console</button>
   </div>
 </div>`;
}

/* --- mini-jeu : devinez le type --- */
const FG=[
 {q:'Le dossier <b>entreprise</b> qui contient d\'autres fichiers',a:'d'},

let fgScore=0, fgTotal=0, fgCur=0;
function fileGuessNew(){
 let n; do{ n=Math.floor(Math.random()*FG.length); }while(n===fgCur && FG.length>1);
 fgCur=n;
 const q=document.getElementById('fs-q'); if(q) q.innerHTML='Quel est le type de : '+FG[n].q+' ?';
 const fb=document.getElementById('fs-gfb'); if(fb){fb.className='fs-gfb';fb.textContent='';}
}
function fileGuessAns(sym){
 const ok=(sym===FG[fgCur].a); fgTotal++; if(ok) fgScore++;
 const fb=document.getElementById('fs-gfb');
 if(fb){ fb.className='fs-gfb show '+(ok?'good':'bad');
   fb.innerHTML=(ok?'✓ Exact ! ':'✗ Non, c\'était <code>'+FG[fgCur].a+'</code>. ')+'Score : '+fgScore+' / '+fgTotal; }
 const sc=document.getElementById('fs-score'); if(sc) sc.textContent=fgScore+' / '+fgTotal;
 setTimeout(fileGuessNew, 1100);
}

function buildAll(){
  const nav=document.getElementById('navList');
  const content=document.getElementById('content');
  PARTS.forEach(p=>{
    const b=document.createElement('button');
    b.className='navbtn';b.dataset.p=p.n;
    b.innerHTML=`<span class="num">${p.n}</span><span class="tx">${p.nav}</span><span class="dot" id="dot-${p.n}"></span>`;
    b.onclick=()=>goPart(p.n);
    nav.appendChild(b);

    const sec=document.createElement('section');
    sec.className='part';sec.dataset.p=p.n;
    let inner='';
    if(p.n===1) inner=buildPresentation();
    else if(p.n===2) inner=buildArchitecture();
    else if(p.n>=3&&p.n<=10){
      let extra=p.n===4?buildPart3extra():p.n===6?buildPart5extra():'';
      let sim=p.n===10?buildAdminSim():'';
      inner=figureFor(p.n)+sim+extra+buildCmdPart(p.n,HINTS[p.n]);
    }
    else if(p.n===11) inner=buildQuiz();
    else if(p.n===12) inner=buildCert();
    sec.innerHTML=`<span class="eyebrow">Partie ${p.n} / 12</span>
      <h2>${p.title}</h2><p class="lead">${partIntro(p.n)}</p>${inner}`;
    content.appendChild(sec);
  });
  // monter les terminaux
  for(let n=3;n<=10;n++){const host=document.getElementById('host-'+n);if(host)createTerminal(host,HINTS[n]);}
  // missions
  for(let n=3;n<=10;n++) renderMissions(n);
  goPart(1);
  updateProgress();
}

/* persistance (sans casser dans l'aperçu) */
function saveProgress(){
  try{localStorage.setItem('atelierLinux',JSON.stringify({
    name:document.getElementById('studentName').value,
    completed:[...completed],quizPassed
  }));}catch(e){}
}
function loadProgress(){
  try{
    const d=JSON.parse(localStorage.getItem('atelierLinux')||'{}');
    if(d.name) document.getElementById('studentName').value=d.name;
    nameDone=nameValid();
    if(Array.isArray(d.completed)) d.completed.forEach(n=>completed.add(n));
    if(d.quizPassed){quizPassed=true;unlockCert();}
  }catch(e){}
}
document.getElementById('studentName').addEventListener('input',()=>{
  const nm=document.getElementById('studentName').value.trim();
  nameDone=nameValid();
  const cn=document.getElementById('certName');if(cn)cn.textContent=nm||'[Nom de l\'étudiant]';
  updateProgress();
  saveProgress();
});
